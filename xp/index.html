<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Windows XP Simulator with AI Internet</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- Windows XP Theme (include only one theme at a time) -->
    <link rel="stylesheet" href="https://unpkg.com/xp.css" />
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <!-- hls.js: HLS (.m3u8) playback for NL songs in Windows Media Player -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.16"></script>
  </head>
  <body>
    <div class="desktop" style="background-image: url('bg.jpg');">
      <div class="icons">
        <!-- Desktop icons will be added dynamically from the Desktop folder -->
      </div>
      <div class="taskbar">
        <div class="start-button"></div>
        <div class="taskbar-buttons"></div>
        <div class="taskbar-right">
          <div id="clock"></div>
        </div>
      </div>
      <div class="start-menu">
        <div class="start-menu-header">
          <img src="Profile_Chess.webp" alt="User icon" width="48" height="48">
          <span data-system-text="true">Administrator</span>
        </div>
        <div class="start-menu-items">
          <!-- Start menu items will be added dynamically -->
        </div>
      </div>
    </div>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
